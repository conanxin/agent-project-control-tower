# GitHub Actions CI for agent-project-control-tower
# ACT-4A: verification only. No deployment (ACT-4B will add pages.yml).
#
# What this workflow does on every push and pull_request:
#   1. Check out the repo
#   2. Set up Python 3.12 and run the zero-dependency acceptance suite
#      (make all): validate + build + testsmoke + clismoke.
#   3. Set up Node 20 and build the Astro dashboard (this is what the
#      public publish will eventually serve).
#   4. Run the ACT-4A public-publish preflight end-to-end so we know
#      the public-data → generated → dashboard pipeline still works.
#
# If any of those steps fail, the workflow fails.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  zero-dep-acceptance:
    name: zero-dep acceptance (make all)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Seed local data from examples
        run: make seed
      - name: Run zero-dep acceptance
        run: make all
      - name: Upload generated/index.json (data)
        uses: actions/upload-artifact@v4
        with:
          name: generated-index-data
          path: generated/index.json
          if-no-files-found: error
          retention-days: 7

  astro-dashboard:
    name: astro dashboard (make dashboard)
    runs-on: ubuntu-latest
    needs: zero-dep-acceptance
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Seed local data from examples
        run: make seed
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Build dashboard from data/
        run: make dashboard
      - name: Upload dashboard dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: apps/dashboard/dist/
          if-no-files-found: error
          retention-days: 7

  publish-preflight:
    name: publish preflight (ACT-4A)
    runs-on: ubuntu-latest
    needs: zero-dep-acceptance
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Seed local data from examples
        # ACT-9C: needed because the CI preflight runs against
        # public-data (the fixture seed from examples/), and
        # `make publish-preflight-examples` reads examples/ →
        # public-data/. Without this seed, public-data is empty
        # on a fresh runner.
        run: make seed
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json
      - name: Install dashboard dependencies
        working-directory: apps/dashboard
        run: npm ci
      - name: Run publish preflight (examples fixture — ACT-9C CI variant)
        # ACT-9C: CI uses `make publish-preflight-examples` (NOT the
        # plan-driven `publish-preflight`). Reason: the plan file
        # lists the 3 real production projects; on CI those don't
        # exist in data/ (data/ is gitignored, and `make seed` from
        # examples/ only writes the 2 demo projects). A plan-driven
        # export on CI would write an empty public-data/, which
        # then fails validation. The CI preflight verifies the
        # **pipeline** (export → validate → build → dashboard) using
        # the sanitized examples/ fixture, which is what ACT-4A
        # originally specified. Local-hermes is the only machine
        # that runs the plan-driven `make publish-preflight` for
        # real production refreshes.
        run: make publish-preflight-examples
      - name: Upload public-data manifest
        uses: actions/upload-artifact@v4
        with:
          name: public-data-manifest
          path: public-data/MANIFEST.json
          if-no-files-found: error
          retention-days: 7
      - name: Upload generated/index.json (public)
        uses: actions/upload-artifact@v4
        with:
          name: generated-index-public
          path: generated/index.json
          if-no-files-found: error
          retention-days: 7
      - name: Upload public embedded snapshot
        uses: actions/upload-artifact@v4
        with:
          name: site-embedded-public
          path: site/index.embedded.html
          if-no-files-found: error
          retention-days: 7
